name: Build and Bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-args: -I

      - name: Bundle Lua Files
        run: |
          python -c '
          import os

          # Đọc nội dung mã nguồn gốc
          with open("src/config.lua", "r") as f:
              config = f.read()

          with open("src/modules/utils.lua", "r") as f:
              utils = f.read()

          with open("src/modules/headless.lua", "r") as f:
              headless = f.read()

          with open("src/init.lua", "r") as f:
              init = f.read()

          # Chuẩn hóa loại bỏ các lệnh return ở module con
          config = config.replace("return Config", "")
          utils = utils.replace("return Utils", "")
          headless = headless.replace("return Headless", "")

          # Chuyển đổi định nghĩa biến cục bộ thành biến toàn cục của Bundle
          config = config.replace("local Config =", "Config =")
          utils = utils.replace("local Utils =", "Utils =")
          headless = headless.replace("local Headless =", "Headless =")

          # Vô hiệu hóa lệnh require thủ công
          headless = headless.replace("local Utils = require(script.Parent.utils)", "-- local Utils")
          headless = headless.replace("local Config = require(script.Parent.Parent.config)", "-- local Config")

          init = init.replace("local Config = require(script.Parent.config)", "-- local Config")
          init = init.replace("local Headless = require(script.Parent.modules.headless)", "-- local Headless")

          # Ghép thành tệp đơn nhất
          bundle = f"""-- // BUNDLED SCRIPT GENERATED BY GITHUB ACTIONS
          -- // DO NOT EDIT DIRECTLY

          local Config
          local Utils
          local Headless

          -- // config.lua
          do
          {config}
          end

          -- // modules/utils.lua
          do
          {utils}
          end

          -- // modules/headless.lua
          do
          {headless}
          end

          -- // init.lua
          do
          {init}
          end
          """

          os.makedirs("build", exist_ok=True)
          with open("build/bundled.lua", "w") as f:
              f.write(bundle)
          '

      - name: Commit & Push Compiled Bundle
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build/bundled.lua
          git diff-index --quiet HEAD || git commit -m "chore: auto bundle lua files [skip ci]"
          git push
